[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Legacy route — /voor-gemeenten was renamed to /in-jouw-buurt in
# 2026-04. Keep 301s for inbound links from Google / partner emails.
# Locale-specific rules come before the catch-all so they match first.
[[redirects]]
  from = "/voor-gemeenten"
  to = "/in-jouw-buurt"
  status = 301
  force = true

[[redirects]]
  from = "/en/voor-gemeenten"
  to = "/en/in-jouw-buurt"
  status = 301
  force = true

[[redirects]]
  from = "/ara/voor-gemeenten"
  to = "/ara/in-jouw-buurt"
  status = 301
  force = true

# Redirect all routes to the SPA for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"]}

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
